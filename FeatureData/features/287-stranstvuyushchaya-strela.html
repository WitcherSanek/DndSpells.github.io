  <h2>СТРАНСТВУЮЩАЯ СТРЕЛА</h2>
  <ul><li><div><p>Вы учитесь направлять сбившуюся стрелу к новой цели. Когда вы делаете бросок атаки магической стрелой и промахиваетесь, вы можете бонусным действием перебросить бросок атаки по другой цели, находящейся в пределах 60 футов от изначальной цели.</p></div></li></ul>
