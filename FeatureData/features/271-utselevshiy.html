  <ul><li><div><p>Вы достигаете вершин стойкости в бою. В начале каждого своего хода вы восстанавливаете количество хитов, равное 5 + ваш модификатор Телосложения, если количество ваших хитов не превышает половины от максимума. Это умение не работает, если у вас 0 хитов.</p></div></li></ul>
