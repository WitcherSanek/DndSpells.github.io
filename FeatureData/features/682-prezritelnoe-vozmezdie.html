  <h2>ПРЕЗРИТЕЛЬНОЕ ВОЗМЕЗДИЕ</h2>
  <ul><li><div><p>Те, кто дерзнут вас ударить, психически караются за свою наглость.</p><p>Когда существо попадает по вам атакой, это существо получает урон психической энергией, равный вашему модификатору Харизмы (минимум 1), если вы не недееспособны.</p></div></li></ul>
