  <h2>ИСКАТЕЛЬ ДУХОВ</h2>
  <ul><li><div><p>Ваш путь, тесно связанный с дикой природой, даёт вам близость с животными. Вы получаете возможность накладывать заклинания <em>животные чувства [beast sense]</em> и <em>разговор с животными [speak with animals]</em>, но только в виде ритуалов.</p></div></li></ul>
</article>
