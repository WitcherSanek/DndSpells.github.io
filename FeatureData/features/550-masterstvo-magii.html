  <h2>МАСТЕРСТВО МАГИИ</h2>
  <ul><li><div><p>Вы выбираете четыре заклинания из списка заклинаний волшебника, по одному следующих уровней: 6-й, 7-й, 8-й и 9-й. Добавьте их в список доменных заклинаний. Как и все доменные заклинания, они всегда подготовлены и для вас считаются заклинаниями жреца.</p></div></li></ul>
