  <h2>ДАР ГЛУБИН</h2>
  <ul><li><div><p>Вы можете дышать под водой, и вы получаете скорость плавания, равную вашей скорости ходьбы.</p><p>Вы также можете один раз наложить заклинание подводное дыхание [water breathing], не расходуя ячейку заклинаний. Вы восстанавливаете это умение после окончания продолжительного отдыха.</p></div></li></ul>
