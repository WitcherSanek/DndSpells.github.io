  <h2>ВЫСШЕЕ ИСЦЕЛЕНИЕ</h2>
  <ul><li><div><p>Если вы должны бросить одну или несколько костей, чтобы восстановить заклинанием хиты, вы для каждой кости используете максимальное значение. Например, вместо восстановления существу 2к6 хитов, вы восстанавливаете 12.</p></div></li></ul>
