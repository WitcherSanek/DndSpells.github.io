  <h2>АТАКА С ВЫПАДОМ</h2>
  <ul><li><div><p> Если вы в свой ход совершаете рукопашную атаку оружием, вы можете потратить одну кость превосходства, чтобы увеличить досягаемость этой атаки на 5 футов. В случае попадания вы добавляете кость превосходства к броску урона этой атаки.</p></div></li></ul>
