  <h2>РАЗРУШИТЕЛЬ ЗАКЛИНАНИЙ</h2>
  <ul><li><div><p>При восстановлении хитов союзнику с помощью заклинания 1-го уровня или выше, вы можете так же развеять одно выбранное вами заклинание, наложенное на это существо. Уровень прерываемого заклинания должен быть равен или ниже уровню ячейки целебного заклинания.</p></div></li></ul>
</article>
