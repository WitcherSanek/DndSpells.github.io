  <h2>КОНТРОЛИРУЕМЫЙ ВСПЛЕСК</h2>
  <ul><li><div><p>Всякий раз, когда вы совершаете бросок по таблице «Дикая магия», вы можете бросить две кости и выбрать любой из двух эффектов. Если на костях выпало одинаковое значение, то вы можете проигнорировать его и выбрать любой эффект из таблицы.</p></div></li></ul>
