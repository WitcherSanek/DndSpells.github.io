  <h2>УЛУЧШЕННАЯ ЗАЩИТА</h2>
  <ul><li><div><p><em>Предмет: доспехи или щит </em></p><p>Существо получает бонус +1 к КД, пока носит (доспех) или держит в руках (щит) предмет с инфузией.</p><p>Бонус увеличивается до +2, когда вы достигаете 10-го уровня в этом классе.</p></div></li></ul>
