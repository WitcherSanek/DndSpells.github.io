  <h2>ТОЧНАЯ АТАКА</h2>
  <ul><li><div><p>Если вы совершаете бросок атаки оружием по существу, вы можете потратить одну кость превосходства, чтобы добавить её к броску. Вы можете использовать этот приём до или после совершения броска атаки, но до применения эффектов атаки.</p></div></li></ul>
