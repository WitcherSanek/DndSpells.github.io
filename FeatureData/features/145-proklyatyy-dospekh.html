  <h2>ПРОКЛЯТЫЙ ДОСПЕХ</h2>
  <ul><li><div><p>Ваше проклятие становится более мощным. Если цель, проклятая вашим проклятием ведьмовского клинка, попадает по вам броском атаки, вы можете реакцией бросить к6. При результате 4 или выше атака промахивается по вам, независимо от броска проклятого существа.</p></div></li></ul>
