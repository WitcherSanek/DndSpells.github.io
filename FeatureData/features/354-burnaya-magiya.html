  <h2>БУРНАЯ МАГИЯ</h2>
  <ul><li><div><p>Вы можете в свой ход бонусным действием заставить завихряющиеся порывы стихийного ветра на мгновение окружить вас прямо перед тем или прямо после того, как вы накладываете заклинание 1-го уровня или выше. Это позволяет вам отлететь на расстояние до 10 футов, не провоцируя атак.</p></div></li></ul>
