  <h2>БЛАГОСЛОВЕННЫЙ ЦЕЛИТЕЛЬ</h2>
  <ul><li><div><p>Заклинания лечения, которое вы накладываете на других, также лечат и вас. Когда вы накладываете заклинание 1-го уровня или выше, которое восстанавливает хиты другому существу, вы восстанавливаете себе число хитов, равное 2 + уровень заклинания.</p></div></li></ul>
</article>
