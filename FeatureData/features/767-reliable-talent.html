  <h2>НАДЁЖНЫЙ ТАЛАНТ</h2>
  <ul><li><div><p>Вы улучшаете выбранные навыки, пока они не достигнут совершенства. Каждый раз, когда вы совершаете проверку характеристики, которая позволяет добавить бонус мастерства, вы можете при выпадении на к20 результата «1–9» считать, что выпало «10».</p></div></li></ul>
