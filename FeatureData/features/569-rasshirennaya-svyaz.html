  <h2>РАСШИРЕННАЯ СВЯЗЬ</h2>
  <ul><li><div><p>Преимущества ваших умений «Ободряющая связь» и «Защитная связь» теперь действуют, когда существа находятся в пределах 60 футов друг от друга. Более того, когда существо использует «Защитную связь», оно получает сопротивление урону, получаемому в результате этого умения.</p></div></li></ul>
