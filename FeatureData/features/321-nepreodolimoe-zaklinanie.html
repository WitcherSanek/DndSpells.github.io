  <h2>НЕПРЕОДОЛИМОЕ ЗАКЛИНАНИЕ</h2>
  <ul><li><div><p>Когда вы накладываете заклинание, которое вынуждает существо совершить спасбросок для защиты от его эффектов, вы можете потратить 3 единицы чародейства, чтобы одна из целей заклинания совершила первый спасбросок от этого заклинания с помехой.</p></div></li></ul>
