  <h2>БОЕВОЙ ДИКИЙ ОБЛИК</h2>
  <ul><li><div><p>Вы можете использовать умение «Дикий облик» бонусным действием, а не действием.</p><p>Кроме того, пока вы перевоплощены умением «Дикий облик», вы можете бонусным действием потратить ячейку заклинания, чтобы восстановить 1к8 хитов за каждый уровень потраченной ячейки.</p></div></li></ul>
