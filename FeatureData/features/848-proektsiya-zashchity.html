  <h2>ПРОЕКЦИЯ ЗАЩИТЫ</h2>
  <ul><li><div><p>Когда видимое вами существо, находящееся в пределах 30 футов от вас, получает урон, вы можете реакцией поглотить этот урон вашей «Магической защитой». Если урон опускает хиты защиты до 0, то защищаемое существо получает весь оставшийся урон.</p></div></li></ul>
