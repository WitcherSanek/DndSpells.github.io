  <h2>ПЕСНЬ ЗАЩИТЫ</h2>
  <ul><li><div><p>Пока длится ваша «Песнь клинка», вы можете направить свою магию на поглощение урона. Когда вы получаете урон, вы можете реакцией потратить одну ячейку заклинаний и уменьшить получаемый вами урон на уровень потраченной ячейки, умноженный на пять.</p></div></li></ul>
