  <ul><li><div><p>Вы можете использовать действие Помощь бонусным действием. Когда вы используете действие Помощь союзнику в атаке существа, цель этой атаки может быть в 30 футах от вас, а не в 5 футах, если цель может видеть или слышать вас.</p></div></li></ul>
