  <h2>ГУЛЯЮЩИЙ С ДУХАМИ</h2>
  <ul><li><div><p>Вы получаете возможность накладывать заклинание <em>общение с природой [commune with nature]</em> в качестве ритуала. Когда вы делаете это, призрачная версия одного из ваших тотемных животных является вам и сообщает необходимую информацию.</p></div></li></ul>
