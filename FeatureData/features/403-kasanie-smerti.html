  <h2>КАСАНИЕ СМЕРТИ</h2>
  <ul><li><div><p>Ваши познания смерти позволяют вам извлекать жизненные силы других существ, приближая их гибель. Когда вы снижаете хиты цели в 5 футах от вас до 0, вы получаете временные хиты в размере вашего модификатора Мудрости + ваш уровень монаха (минимум 1 временный хит).</p></div></li></ul>
