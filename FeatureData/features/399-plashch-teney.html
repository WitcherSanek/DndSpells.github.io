  <h2>ПЛАЩ ТЕНЕЙ</h2>
  <ul><li><div><p>Вы узнаёте, как становиться единым с тенью. Когда вы находитесь в области с тусклым освещением или в темноте, вы можете действием стать невидимым. Вы остаётесь невидимыми до тех пор, пока не совершите атаку, не наложите заклинание, или не окажетесь в области яркого света.</p></div></li></ul>
