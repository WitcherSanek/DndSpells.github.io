  <h2>ПРЕОБРАЗОВАННОЕ ЗАКЛИНАНИЕ</h2>
  <ul><li><div><p><em>Опциональный вариант метамагии</em></p><p>Когда вы накладываете заклинание, которое наносит тип урона из перечисленного списка, вы можете потратить 1 единицу чародейства и изменить этот тип урона на другой из следующих: звук, кислота, огонь, холод, электричество, яд.</p></div></li></ul>
