  <h2>УСТОЙЧИВОСТЬ ИСЧАДИЯ</h2>
  <ul><li><div><p>Вы можете выбрать один вид урона, когда заканчиваете короткий или продолжительный отдых. Вы получаете сопротивление этому виду урона, пока вы не выберете другой вид урона при помощи этого умения. Урон от магического или серебряного оружия игнорирует это сопротивление.</p></div></li></ul>
</article>
