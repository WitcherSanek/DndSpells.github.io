  <ul><li><div><p>Ваша душа отмечена для вечной битвы. Если заклинание, такое как <em>оживление [raise dead]</em>, имеет единственный эффект — вернуть вас к жизни (но не нежитью), заклинателю не требуются материальные компоненты, чтобы наложить его на вас.</p></div></li></ul>
