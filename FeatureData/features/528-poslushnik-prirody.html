  <h2>ПОСЛУШНИК ПРИРОДЫ</h2>
  <ul><li><div><p>Вы изучаете один заговор друида на свой выбор. Этот заговор считается заговором жреца для вас, но он не учитывается в общем количестве известных вам заговоров жреца. Вы также получаете владение одним из следующих навыков: Выживание, Природа, Уход за животными.</p></div></li></ul>
